name: Reusable Docker Build & Deploy (prod-serve)

on:
  workflow_call:
    inputs:
      docker_owner:
        required: false
        type: string
        default: "mdeveloperplatform"
      deploy_repo:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME: { required: true }
      DOCKERHUB_TOKEN: { required: true }
      PERSONAL_TOKEN: { required: true }

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate prod-serve branch and set variables
        id: vars
        run: |
          BRANCH="${{ github.ref_name }}"

          # Only allow prod-* branches
          if [[ ! "$BRANCH" =~ ^prod-.*$ ]]; then
            echo "Not a prod-* branch. Skipping deploy."
            exit 1
          fi

          echo "Detected valid prod-serve branch: $BRANCH"

          VERSION="$BRANCH"
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)
          APP_NAME=$(echo "$REPO_NAME" | sed 's/^M-ADP-//' | sed 's/^m-adp-//' | tr '[:upper:]' '[:lower:]')

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-platform image
        run: |
          IMAGE=${{ inputs.docker_owner }}/${{ steps.vars.outputs.app_name }}
          TAG=${{ steps.vars.outputs.version }}

          docker buildx build \
            --platform linux/amd64 \
            -t $IMAGE:$TAG \
            -t $IMAGE:prod-serve-latest \
            --push .

      - name: Checkout values repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.deploy_repo }}
          token: ${{ secrets.PERSONAL_TOKEN }}
          path: values-repo
          ref: master

      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Update Helm values
        run: |
          VALUES_PATH="values-repo/apps/values/prod-serve/${{ steps.vars.outputs.app_name }}.yaml"

          if [[ ! -f "$VALUES_PATH" ]]; then
            echo "❌ ERROR: $VALUES_PATH does not exist"
            exit 1
          fi

          yq eval -i ".image.tag = \"${{ steps.vars.outputs.version }}\"" $VALUES_PATH

          echo "Updated:"
          cat $VALUES_PATH

      - name: Commit and push changes
        run: |
          cd values-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "prod-serve: update image ${{ steps.vars.outputs.app_name }} to ${{ steps.vars.outputs.version }}"
          git push origin master
